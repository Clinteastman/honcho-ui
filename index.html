<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      CSP: defense-in-depth against XSS while we hold a JWT in localStorage.
      Note: `frame-ancestors` and `report-uri` can ONLY be delivered via HTTP
      header; both are silently dropped from <meta> CSP. The Caddy config
      that fronts our reference deployment sets X-Frame-Options: DENY, which
      gives equivalent protection. Self-hosters running behind their own
      server should also set Content-Security-Policy / X-Frame-Options
      headers there.

      connect-src is wildcard because the Honcho base URL is configured by
      the user at runtime - we don't know it at build time. The app rejects
      non-HTTPS endpoints with a visible warning.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src *; base-uri 'self'; form-action 'self';"
    />
    <meta name="referrer" content="no-referrer" />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#1e1e2e" />
    <title>Honcho UI</title>
  </head>
  <body class="bg-base text-text antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
